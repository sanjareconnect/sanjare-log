<!DOCTYPE html>
<html>
<head>
  <title>Sanjar-E-Connect</title>

  <style>
    body {
      font-family: Arial;
      background: #f2f2f2;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      text-align: center;
    }

    h1 {
      margin-bottom: 10px;
    }

    p {
      color: #555;
      margin-bottom: 20px;
    }

    .btn {
      display: block;
      width: 200px;
      margin: 10px auto;
      padding: 12px;
      border-radius: 8px;
      border: none;
      background: #ffffff;
      box-shadow: 0 3px 8px rgba(0,0,0,0.1);
      cursor: pointer;
      font-size: 15px;
    }

    .btn:hover {
      background: #e6e6e6;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>Welcome to Sanjar-E-Connect</h1>
  <p>Select an option</p>

  <button class="btn" onclick="goTrip()">Trip Log</button>
  <button class="btn" onclick="goFuel()">Fuel Log</button>

</div>

<script>

function goTrip() {
  // IMPORTANT: match your trip file name here
  window.location.href = "trip.html";
}

function goFuel() {
  alert("Fuel Log page not created yet");
}

</script>

</body>
</html>
