<!DOCTYPE html>
<html>
<head>
  <title>Sanjar-E-Connect</title>

  <!-- 🔥 Mobile Responsive -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #f2f2f2;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      text-align: center;
      width: 90%;
      max-width: 400px;
    }

    /* 🔥 BIG TITLE */
    h1 {
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    p {
      color: #555;
      margin-bottom: 25px;
      font-size: 16px;
    }

    /* 🔥 BIG BUTTONS */
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 16px;
      border-radius: 10px;
      border: none;
      background: #ffffff;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      cursor: pointer;
      font-size: 18px;
      font-weight: bold;
      margin-top: 12px;
    }

    .btn:hover {
      background: #e6e6e6;
    }

    /* 🔥 BIG EMOJI */
    .emoji {
      font-size: 26px;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>Welcome to Sanjar-E-Connect</h1>
  <p>Select an option</p>

  <button class="btn" onclick="goTrip()">
    <span class="emoji">🚖</span>
    <span>Trip Log</span>
  </button>

  <button class="btn" onclick="goFuel()">
    <span class="emoji">⛽</span>
    <span>Fuel Log</span>
  </button>

</div>

<script>

function goTrip() {
  window.location.href = "trip.html"; // ensure name correct
}

function goFuel() {
  alert("Fuel Log page not created yet");
}

</script>

</body>
</html>
