<!DOCTYPE html>
<html>
<head>
  <title>Sanjar-E-Connect</title>

  <!-- Mobile Responsive -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;

      /* 🔥 Background Image */
      background: url('https://static.vecteezy.com/system/resources/thumbnails/020/173/227/small/businessman-using-virtual-of-global-logistics-network-distribution-smart-logistics-transportation-import-export-concept-cargo-freight-ship-truck-at-industrial-port-global-business-and-technology-photo.jpg') 
                  no-repeat center center/cover;
    }

    /* 🔥 Dark Overlay */
    body::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      z-index: 0;
    }

    .container {
      text-align: center;
      width: 90%;
      max-width: 400px;
      position: relative;
      z-index: 1;
    }

    /* 🔥 Title */
    h1 {
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 10px;
      color: #ffffff;
    }

    p {
      color: #ddd;
      margin-bottom: 25px;
      font-size: 16px;
    }

    /* 🔥 Buttons */
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 16px;
      border-radius: 10px;
      border: none;
      background: rgba(255, 255, 255, 0.9);
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      cursor: pointer;
      font-size: 18px;
      font-weight: bold;
      margin-top: 12px;
    }

    .btn:hover {
      background: #ffffff;
    }

    /* 🔥 Emoji */
    .emoji {
      font-size: 26px;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>Welcome to Sanjar-E-Connect</h1>
  <p>Select an option</p>

  <button class="btn" onclick="goTrip()">
    <span class="emoji">🚖</span>
    <span>Trip Log</span>
  </button>

  <button class="btn" onclick="goFuel()">
    <span class="emoji">⛽</span>
    <span>Fuel Log</span>
  </button>

</div>

<script>

function goTrip() {
  window.location.href = "trip.html"; // ensure correct file name
}

function goFuel() {
  alert("Fuel Log page not created yet");
}

</script>

</body>
</html>
