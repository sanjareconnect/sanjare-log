<!DOCTYPE html>
<html>
<head>
  <title>Sanjar-E-Connect</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;

      background: url('https://static.vecteezy.com/system/resources/thumbnails/071/519/140/small_2x/person-holding-a-blue-car-model-with-digital-security-and-insurance-icons-concept-of-car-protection-safety-and-security-digital-car-insurance-and-safety-futuristic-technology-photo.jpg')
                  no-repeat center center/cover;
    }

    body::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 95%;
      max-width: 420px;
      text-align: center;
    }

    h1 {
      color: white;
      font-size: 26px;
      margin-bottom: 10px;
    }

    p {
      color: #ddd;
      margin-bottom: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;

      padding: 16px;
      border-radius: 14px;
      border: none;

      background: rgba(255,255,255,0.65);
      backdrop-filter: blur(6px);

      box-shadow: 0 4px 10px rgba(0,0,0,0.25);

      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
    }

    .btn:hover {
      background: rgba(255,255,255,0.85);
    }

    .emoji {
      font-size: 26px;
      margin-bottom: 6px;
    }

    .empty {
      opacity: 0.4;
    }

  </style>
</head>

<body>

<div class="container">

  <h1>Sanjar-E-Connect</h1>
  <p>Select an option</p>

  <div class="grid">

    <!-- ATTENDANCE -->
    <button class="btn" onclick="goAttendance()">
      <div class="emoji">👨‍✈️📲</div>
      UN-Attendance
    </button>

    <!-- TRIP -->
    <button class="btn" onclick="goTrip()">
      <div class="emoji">🚖</div>
      Trip Log
    </button>

    <!-- FUEL -->
    <button class="btn" onclick="goFuel()">
      <div class="emoji">⛽</div>
      Fuel Log
    </button>

    <!-- LEADS -->
    <button class="btn" onclick="goLeads()">
      <div class="emoji">📞🚖</div>
      UN-Leads
    </button>

    <!-- MARKET SPOT -->
    <button class="btn" onclick="goMarketSpot()">
      <div class="emoji">🏙️🚉✈️🌊</div>
      Market-Spot
    </button>

    <!-- EMPTY SLOT -->
    <button class="btn empty">
      <div class="emoji">➕</div>
      Empty Slot 3
    </button>

    <!-- EMPTY SLOT -->
    <button class="btn empty">
      <div class="emoji">➕</div>
      Empty Slot 4
    </button>

    <!-- HEAT SPOT -->
    <button class="btn" onclick="goHeatSpot()">
      <div class="emoji">📍🔥🚦</div>
      Heat-Spot
    </button>

  </div>

</div>

<script>

function goAttendance() {
  window.location.href = "attendance.html";
}

function goTrip() {
  window.location.href = "trip.html";
}

function goFuel() {
  window.location.href = "fuel.html";
}

function goLeads() {
  alert("UN-Leads page not created yet");
}

function goMarketSpot() {
  alert("Market-Spot page not created yet");
}

function goHeatSpot() {
  alert("Heat-Spot page not created yet");
}

</script>

</body>
</html>
