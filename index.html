<!DOCTYPE html>
<html>
<head>
  <title>Sanjar-E-Connect</title>

  <!-- Mobile Responsive -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;

      /* 🔥 UPDATED BACKGROUND IMAGE */
      background: url('https://static.vecteezy.com/system/resources/thumbnails/071/519/140/small_2x/person-holding-a-blue-car-model-with-digital-security-and-insurance-icons-concept-of-car-protection-safety-and-security-digital-car-insurance-and-safety-futuristic-technology-photo.jpg')
                  no-repeat center center/cover;
    }

    /* 🔥 DARK OVERLAY */
    body::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.55);
      z-index: 0;
    }

    .container {
      text-align: center;
      width: 90%;
      max-width: 400px;
      position: relative;
      z-index: 1;
    }

    h1 {
      font-size: 30px;
      font-weight: bold;
      margin-bottom: 10px;
      color: #ffffff;
    }

    p {
      color: #ddd;
      margin-bottom: 25px;
      font-size: 16px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      width: 100%;
      padding: 18px;
      border-radius: 12px;
      border: none;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 5px 12px rgba(0,0,0,0.25);
      cursor: pointer;
      font-size: 20px;
      font-weight: bold;
      margin-top: 14px;
    }

    .btn:hover {
      background: #ffffff;
    }

    .emoji {
      font-size: 30px;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>Welcome to Sanjar-E-Connect</h1>
  <p>Select an option</p>

  <button class="btn" onclick="goTrip()">
    <span class="emoji">🚖</span>
    <span>Trip Log</span>
  </button>

  <button class="btn" onclick="goFuel()">
    <span class="emoji">⛽</span>
    <span>Fuel Log</span>
  </button>

</div>

<script>

function goTrip() {
  window.location.href = "trip.html";
}

function goFuel() {
  alert("Fuel Log page not created yet");
}

</script>

</body>
</html>
