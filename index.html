<!DOCTYPE html>
<html>
<head>
  <title>Sanjar-E-Connect</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;

      background: url('https://static.vecteezy.com/system/resources/thumbnails/071/519/140/small_2x/person-holding-a-blue-car-model-with-digital-security-and-insurance-icons-concept-of-car-protection-safety-and-security-digital-car-insurance-and-safety-futuristic-technology-photo.jpg')
                  no-repeat center center/cover;
    }

    /* VERY LIGHT OVERLAY (to keep background visible) */
    body::before {
      content: "";
      position: fixed;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.18);
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 95%;
      max-width: 420px;
      text-align: center;
    }

    h1 {
      color: white;
      font-size: 26px;
      margin-bottom: 10px;
      text-shadow: 0 2px 6px rgba(0,0,0,0.6);
    }

    p {
      color: #f5f5f5;
      margin-bottom: 20px;
      text-shadow: 0 2px 6px rgba(0,0,0,0.6);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 20px;
    }

    .btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;

      padding: 16px;
      border-radius: 16px;

      /* LIGHT TRANSPARENT GLASS */
      background: rgba(255,255,255,0.55);
      backdrop-filter: blur(6px);

      border: 1px solid rgba(255,255,255,0.4);

      box-shadow: 0 6px 16px rgba(0,0,0,0.18);

      font-size: 14px;
      font-weight: 600;
      cursor: pointer;

      color: #111;
      transition: all 0.25s ease;
    }

    .btn:hover {
      transform: translateY(-3px);
      background: rgba(255,255,255,0.75);
    }

    .emoji {
      font-size: 26px;
      margin-bottom: 6px;
    }

  </style>
</head>

<body>

<div class="container">

  <h1>Sanjar-E-Connect</h1>
  <p>Select an option</p>

  <!-- MAIN GRID -->
  <div class="grid">

    <button class="btn" onclick="goAttendance()">
      <div class="emoji">👨‍✈️📲</div>
      UN-Attendance
    </button>

    <button class="btn" onclick="goTrip()">
      <div class="emoji">🚖</div>
      Trip Log
    </button>

    <button class="btn" onclick="goFuel()">
      <div class="emoji">⛽</div>
      Fuel Log
    </button>

    <button class="btn" onclick="goLeads()">
      <div class="emoji">📞🚖</div>
      UN-Leads
    </button>

    <button class="btn" onclick="goMarketSpot()">
      <div class="emoji">👥🚉✈️🚢</div>
      Market-Spot
    </button>

    <button class="btn" onclick="goStatus()">
      <div class="emoji">📊🏆</div>
      Day Status
    </button>

    <button class="btn" onclick="goBusiness()">
      <div class="emoji">💼📈</div>
      Business Bay
    </button>

    <button class="btn" onclick="goHeatSpot()">
      <div class="emoji">🔥🚦</div>
      Heat-Spot
    </button>

  </div>

  <!-- SECOND GRID -->
  <div class="grid">

    <button class="btn" onclick="goLevelUp()">
      <div class="emoji">🚀🎯</div>
      Level-Up
    </button>

    <button class="btn" onclick="goRewards()">
      <div class="emoji">🎁🏅</div>
      Rewards
    </button>

    <button class="btn" onclick="goRanking()">
      <div class="emoji">🥇</div>
      Ranking
    </button>

    <button class="btn" onclick="goDropBox()">
      <div class="emoji">⚖️📥</div>
      Drop Box
    </button>

  </div>

</div>

<script>

function goAttendance(){window.location.href="attendance.html";}
function goTrip(){window.location.href="trip.html";}
function goFuel(){window.location.href="fuel.html";}

function goLeads(){alert("UN-Leads page not created yet");}
function goMarketSpot(){alert("Market-Spot page not created yet");}
function goStatus(){alert("Day Status page not created yet");}
function goBusiness(){alert("Business Bay page not created yet");}
function goHeatSpot(){alert("Heat-Spot page not created yet");}

function goLevelUp(){alert("Level-Up page not created yet");}
function goRewards(){alert("Rewards page not created yet");}
function goRanking(){alert("Ranking page not created yet");}
function goDropBox(){alert("Drop Box page not created yet");}

</script>

</body>
</html>
