<!DOCTYPE html>
<html>
<head>
  <title>Sanjar-E-Connect</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f5f5f5;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    h1 {
      font-size: 40px;
      font-weight: bold;
    }

    p {
      font-size: 18px;
      color: #555;
    }

    .box {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: white;
      margin: 15px auto;
      padding: 15px;
      width: 220px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      cursor: pointer;
      font-size: 20px;
      transition: 0.2s;
    }

    .box:hover {
      background: #eaeaea;
      transform: scale(1.05);
    }

    .emoji {
      font-size: 26px;
    }
  </style>
</head>

<body>

<div>
  <h1>Welcome to Sanjar-E-Connect</h1>
  <p>Select an option</p>

  <div class="box" onclick="openTrip()">
    <span class="emoji">🚖</span>
    <span>Trip Log</span>
  </div>

  <div class="box" onclick="openFuel()">
    <span class="emoji">⛽</span>
    <span>Fuel Log</span>
  </div>
</div>

<script>
function openTrip() {
  window.location.href = "trip.html";
}

function openFuel() {
  window.location.href = "fuel.html";
}
</script>

</body>
</html>
