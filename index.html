<!DOCTYPE html>
<html>
<head>
  <title>Sanjar-E-Connect</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;

      background: url('https://static.vecteezy.com/system/resources/thumbnails/071/519/140/small_2x/person-holding-a-blue-car-model-with-digital-security-and-insurance-icons-concept-of-car-protection-safety-and-security-digital-car-insurance-and-safety-futuristic-technology-photo.jpg')
                  no-repeat center center/cover;
    }

    body::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      z-index: 0;
    }

    .container {
      text-align: center;
      width: 90%;
      max-width: 400px;
      position: relative;
      z-index: 1;
    }

    h1 {
      font-size: 30px;
      font-weight: bold;
      margin-bottom: 10px;
      color: #ffffff;
    }

    p {
      color: #ddd;
      margin-bottom: 25px;
      font-size: 16px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;

      width: 85%;
      margin: 12px auto;

      padding: 12px;
      border-radius: 10px;
      border: none;

      background: rgba(255, 255, 255, 0.65);
      backdrop-filter: blur(6px);

      box-shadow: 0 4px 10px rgba(0,0,0,0.2);

      cursor: pointer;
      font-size: 18px;
      font-weight: bold;
    }

    .btn:hover {
      background: rgba(255, 255, 255, 0.85);
    }

    .emoji {
      font-size: 26px;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>Welcome to Sanjar-E-Connect</h1>
  <p>Select an option</p>

  <!-- ✅ NEW ATTENDANCE -->
  <button class="btn" onclick="goAttendance()">
    <span class="emoji">👨‍✈️📲</span>
    <span>UN-Attendance</span>
  </button>

  <button class="btn" onclick="goTrip()">
    <span class="emoji">🚖</span>
    <span>Trip Log</span>
  </button>

  <button class="btn" onclick="goFuel()">
    <span class="emoji">⛽</span>
    <span>Fuel Log</span>
  </button>

</div>

<script>

function goAttendance() {
  alert("Attendance page not created yet");
}

function goTrip() {
  window.location.href = "trip.html";
}

function goFuel() {
  alert("Fuel Log page not created yet");
}

</script>

</body>
</html>
