<!DOCTYPE html>
<html>
<head>
  <title>UN-Attendance</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;

      background: linear-gradient(135deg, #e6f0ff, #f8fbff);
    }

    .container {
      width: 95%;
      max-width: 420px;
      text-align: center;
    }

    h2 {
      color: #1a2b4c;
      margin-bottom: 25px;
      font-weight: 600;
    }

    .card {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: space-between;

      padding: 22px;
      border-radius: 16px;
      border: none;

      font-size: 17px;
      font-weight: 600;

      cursor: pointer;

      background: #ffffff;
      color: #1a2b4c;

      box-shadow: 0 6px 18px rgba(0,0,0,0.08);

      transition: 0.25s;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 22px rgba(0,0,0,0.12);
    }

    .left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .emoji {
      font-size: 24px;
    }

    .onboard {
      border-left: 6px solid #28a745;
    }

    .deboard {
      border-left: 6px solid #dc3545;
    }

    .arrow {
      font-size: 18px;
      opacity: 0.6;
    }

    .back {
      margin-top: 25px;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: #dbe7ff;
      color: #1a2b4c;
      cursor: pointer;
      font-weight: 600;
    }

    .back:hover {
      background: #c9dcff;
    }

  </style>
</head>

<body>

<div class="container">

  <h2>🧑‍✈️ UN-Attendance</h2>

  <div class="card">

    <!-- ONBOARD -->
    <button class="btn onboard" onclick="goOnboard()">
      <div class="left">
        <span class="emoji">🧑‍✈️📲🟢</span>
        <span>UN-Onboard</span>
      </div>
      <span class="arrow">›</span>
    </button>

    <!-- DEBOARD -->
    <button class="btn deboard" onclick="goDeboard()">
      <div class="left">
        <span class="emoji">🧑‍✈️📲🔴</span>
        <span>UN-Deboard</span>
      </div>
      <span class="arrow">›</span>
    </button>

  </div>

  <button class="back" onclick="goBack()">⬅ Back</button>

</div>

<script>

function goOnboard() {
  window.location.href = "onboard.html";
}

function goDeboard() {
  window.location.href = "deboard.html";
}

function goBack() {
  window.location.href = "index.html";
}

</script>

</body>
</html>
