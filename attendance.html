<!DOCTYPE html>
<html>
<head>
  <title>Attendance Log</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #e6f0ff, #f8fbff);
    }

    .container {
      width: 95%;
      max-width: 360px; /* slightly reduced width */
      text-align: center;
    }

    h2 {
      color: #1a2b4c;
      margin-bottom: 25px;
      font-weight: 600;
      font-size: 20px;
    }

    .card {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: space-between;

      padding: 26px; /* bigger height */
      border-radius: 18px;
      border: none;

      font-size: 16px;
      font-weight: 600;

      cursor: pointer;

      color: white;

      box-shadow: 0 8px 20px rgba(0,0,0,0.12);

      transition: 0.25s;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .emoji {
      font-size: 26px;
    }

    /* Filled Colors */
    .onboard {
      background: linear-gradient(135deg, #28a745, #218838);
    }

    .deboard {
      background: linear-gradient(135deg, #dc3545, #c82333);
    }

    .arrow {
      font-size: 20px;
      opacity: 0.8;
    }

    .back {
      margin-top: 25px;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: #dbe7ff;
      color: #1a2b4c;
      cursor: pointer;
      font-weight: 600;
    }

    .back:hover {
      background: #c9dcff;
    }

  </style>
</head>

<body>

<div class="container">

  <h2>🧑‍✈️ Urban Navigator Attendance Log</h2>

  <div class="card">

    <!-- ONBOARD -->
    <button class="btn onboard" onclick="goOnboard()">
      <div class="left">
        <span class="emoji">🧑‍✈️📲🟢</span>
        <span>Start Duty (Onboard)</span>
      </div>
      <span class="arrow">›</span>
    </button>

    <!-- DEBOARD -->
    <button class="btn deboard" onclick="goDeboard()">
      <div class="left">
        <span class="emoji">🧑‍✈️📲🔴</span>
        <span>End Duty (Deboard)</span>
      </div>
      <span class="arrow">›</span>
    </button>

  </div>

  <button class="back" onclick="goBack()">⬅ Back</button>

</div>

<script>

function goOnboard() {
  window.location.href = "onboard.html";
}

function goDeboard() {
  window.location.href = "deboard.html";
}

function goBack() {
  window.location.href = "index.html";
}

</script>

</body>
</html>
