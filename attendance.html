<!DOCTYPE html>
<html>
<head>
  <title>UN-Attendance</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;

      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    }

    .container {
      width: 95%;
      max-width: 420px;
      text-align: center;
    }

    h2 {
      color: #ffffff;
      margin-bottom: 25px;
      font-weight: 600;
      letter-spacing: 1px;
    }

    .card {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: space-between;

      padding: 18px;
      border-radius: 16px;
      border: none;

      font-size: 16px;
      font-weight: 600;

      cursor: pointer;

      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      color: white;

      box-shadow: 0 8px 25px rgba(0,0,0,0.3);

      transition: 0.3s;
    }

    .btn:hover {
      transform: translateY(-3px) scale(1.02);
      background: rgba(255,255,255,0.15);
    }

    .left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .icon {
      font-size: 26px;
      animation: float 2s ease-in-out infinite;
    }

    @keyframes float {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }

    .arrow {
      font-size: 22px;
      opacity: 0.7;
    }

    .onboard {
      border-left: 5px solid #28a745;
    }

    .deboard {
      border-left: 5px solid #dc3545;
    }

    .back {
      margin-top: 25px;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: rgba(255,255,255,0.1);
      color: white;
      cursor: pointer;
      font-weight: 600;
    }

    .back:hover {
      background: rgba(255,255,255,0.2);
    }

  </style>
</head>

<body>

<div class="container">

  <h2>👨‍✈️ UN-Attendance</h2>

  <div class="card">

    <!-- ONBOARD -->
    <button class="btn onboard" onclick="goOnboard()">
      <div class="left">
        <span class="icon">🚗</span>
        <span class="icon">➡️</span>
        <span class="icon">👨‍✈️</span>
        <span>UN-Onboard</span>
      </div>
      <span class="arrow">➜</span>
    </button>

    <!-- DEBOARD -->
    <button class="btn deboard" onclick="goDeboard()">
      <div class="left">
        <span class="icon">👨‍✈️</span>
        <span class="icon">➡️</span>
        <span class="icon">🚶‍♂️</span>
        <span>UN-Deboard</span>
      </div>
      <span class="arrow">➜</span>
    </button>

  </div>

  <button class="back" onclick="goBack()">⬅ Back</button>

</div>

<script>

function goOnboard() {
  window.location.href = "onboard.html";
}

function goDeboard() {
  window.location.href = "deboard.html";
}

function goBack() {
  window.location.href = "index.html";
}

</script>

</body>
</html>
