<!DOCTYPE html>
<html>
<head>
  <title>Attendance Log</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #e6f0ff, #f8fbff);
    }

    .container {
      width: 95%;
      max-width: 380px;
      text-align: center;
    }

    h2 {
      color: #1a2b4c;
      margin-bottom: 25px;
      font-weight: 600;
      font-size: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .btn {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;

      padding: 22px;
      border-radius: 18px;
      border: none;

      font-size: 14px;
      font-weight: 600;

      cursor: pointer;

      color: white;
      box-shadow: 0 8px 20px rgba(0,0,0,0.12);

      transition: 0.25s;
    }

    .btn:hover {
      transform: translateY(-3px);
    }

    .emoji {
      font-size: 28px;
      margin-bottom: 6px;
    }

    .onboard {
      background: linear-gradient(135deg, #28a745, #218838);
    }

    .swap {
      background: linear-gradient(135deg, #17a2b8, #117a8b);
    }

    .extend {
      background: linear-gradient(135deg, #ffc107, #e0a800);
      color: #000;
    }

    .deboard {
      background: linear-gradient(135deg, #dc3545, #c82333);
    }

    .back {
      margin-top: 25px;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: #dbe7ff;
      color: #1a2b4c;
      cursor: pointer;
      font-weight: 600;
      width: 100%;
    }

    .back:hover {
      background: #c9dcff;
    }

  </style>
</head>

<body>

<div class="container">

  <h2>🧑‍✈️ Urban Navigator Attendance Log</h2>

  <div class="grid">

    <!-- ONBOARD -->
    <button class="btn onboard" onclick="goOnboard()">
      <div class="emoji">🧑‍✈️📲🟢</div>
      Onboard
    </button>

    <!-- TRIP SWAP -->
    <button class="btn swap" onclick="goSwap()">
      <div class="emoji">🔄🚖</div>
      Trip Swap
    </button>

    <!-- DUTY EXTEND -->
    <button class="btn extend" onclick="goExtend()">
      <div class="emoji">⏱️➕</div>
      Duty Extend
    </button>

    <!-- DEBOARD -->
    <button class="btn deboard" onclick="goDeboard()">
      <div class="emoji">🧑‍✈️📲🔴</div>
      Deboard
    </button>

  </div>

  <button class="back" onclick="goBack()">⬅ Back</button>

</div>

<script>

function goOnboard() {
  window.location.href = "onboard.html";
}

function goSwap() {
  alert("Trip Swap page not created yet");
}

function goExtend() {
  alert("Duty Extend page not created yet");
}

function goDeboard() {
  window.location.href = "deboard.html";
}

function goBack() {
  window.location.href = "index.html";
}

</script>

</body>
</html>
