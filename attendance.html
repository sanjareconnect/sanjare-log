<!DOCTYPE html>
<html>
<head>
  <title>UN-Duty Logger</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      margin: 0;
      padding: 15px;
      background: linear-gradient(135deg, #eef5ff, #ffffff);
    }

    h2 {
      text-align: center;
      color: #1a2b4c;
    }

    label {
      font-weight: bold;
      display: block;
      margin-top: 12px;
    }

    select, input, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 10px;
      border: 1px solid #ccc;
    }

    textarea {
      resize: none;
    }

    .btn {
      margin-top: 20px;
      padding: 14px;
      width: 100%;
      border: none;
      border-radius: 12px;
      background: #1a73e8;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .btn:hover {
      background: #1558b0;
    }

    .checkbox {
      margin-top: 15px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .auto-box {
      background: #f1f5ff;
      padding: 10px;
      border-radius: 10px;
      margin-top: 10px;
    }

  </style>
</head>

<body>

<h2>🧑‍✈️ UN-Duty Logger</h2>

<!-- DRIVER -->
<label>UN-Onboard</label>
<select id="driver">
  <option value="">Select</option>
  <option>Mithin Mohan / SJTW-7770</option>
  <option>Nagaraj Mani / SJTW-8047</option>
</select>

<label>Assigned Fleet</label>
<select id="fleet">
  <option value="">Select</option>
  <option>SJTW-Varaha / KL30L8839</option>
</select>

<label>Duty Type</label>
<select id="dutyType">
  <option value="">Select</option>
  <option>First Shift</option>
  <option>Second Shift</option>
</select>

<label>Duty Mode</label>
<select id="dutyMode">
  <option value="">Select</option>
  <option>90° (12-16 Hrs)</option>
  <option>180° (24-28 Hrs)</option>
  <option>270° (36-40 Hrs)</option>
  <option>360° (48-52 Hrs)</option>
</select>

<label>OMR (Opening Meter Reading)</label>
<input type="number" id="omr">

<!-- MANDATORY -->
<label>Vehicle Photo Uploaded</label>
<select id="vehiclePhoto">
  <option value="">Select</option>
  <option>Yes</option>
  <option>No</option>
</select>

<label>Odometer & Fuel Photo</label>
<select id="fuelPhoto">
  <option value="">Select</option>
  <option>Yes</option>
  <option>No</option>
</select>

<!-- AUTO CAPTURE -->
<div class="auto-box">
  <label>Attendance IN Time (Auto)</label>
  <input type="text" id="attendanceTime" readonly>

  <label>Attendance IN Location (Auto GPS)</label>
  <input type="text" id="attendanceLocation" readonly>
</div>

<!-- REMARK -->
<label>Remark (Optional)</label>
<textarea id="remarkBox" maxlength="200" placeholder="Enter remarks..."></textarea>

<!-- TERMS -->
<div class="checkbox">
  <input type="checkbox" id="agreeTerms">
  <label>Selecting this means you accept terms & conditions</label>
</div>

<!-- BUTTON -->
<button class="btn" onclick="captureAttendance()">Capture Attendance</button>

<script>

// AUTO TIME
function setTime() {
  let now = new Date();
  document.getElementById("attendanceTime").value = now.toLocaleString();
}

// AUTO GPS
function setLocation() {
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(function(pos) {
      document.getElementById("attendanceLocation").value =
        pos.coords.latitude + ", " + pos.coords.longitude;
    });
  }
}

setTime();
setLocation();


// VALIDATION + SUBMIT
function captureAttendance() {

  let selects = document.querySelectorAll("select");
  let omr = document.getElementById("omr").value;
  let time = document.getElementById("attendanceTime").value;
  let loc = document.getElementById("attendanceLocation").value;
  let agree = document.getElementById("agreeTerms");

  // DROPDOWN CHECK
  for (let i = 0; i < selects.length; i++) {
    if (selects[i].value === "") {
      alert("Please complete all required selections");
      return;
    }
  }

  // OMR CHECK
  if (omr === "") {
    alert("Please enter Odometer Reading");
    return;
  }

  // AUTO CHECK
  if (time === "" || loc === "") {
    alert("Auto time/location not captured");
    return;
  }

  // TERMS CHECK
  if (!agree.checked) {
    alert("Please accept Terms & Conditions");
    return;
  }

  // SUCCESS
  alert("Attendance Captured Successfully");

  location.reload();
}

</script>

</body>
</html>
