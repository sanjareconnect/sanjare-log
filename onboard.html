<!DOCTYPE html>
<html>
<head>
  <title>UN-Duty Logger</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      margin: 0;
      padding: 15px;
      background: linear-gradient(135deg, #eef5ff, #ffffff);
    }

    h2 {
      text-align: center;
      color: #1a2b4c;
    }

    label {
      font-weight: bold;
      display: block;
      margin-top: 12px;
    }

    select, input, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 10px;
      border: 1px solid #ccc;
    }

    textarea {
      resize: none;
    }

    .btn {
      margin-top: 20px;
      padding: 14px;
      width: 100%;
      border: none;
      border-radius: 12px;
      background: #1a73e8;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .checkbox {
      margin-top: 15px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .auto-box {
      background: #f1f5ff;
      padding: 10px;
      border-radius: 10px;
      margin-top: 10px;
    }

  </style>
</head>

<body>

<h2>🧑‍✈️ UN-Duty Logger</h2>

<!-- DROPDOWNS -->
<label>UN-Onboard</label>
<select>
  <option>Select</option>
  <option>Mithin Mohan</option>
  <option>Nagaraj Mani</option>
</select>

<label>Assigned Fleet</label>
<select>
  <option>Select</option>
  <option>SJTW-Varaha</option>
</select>

<label>Duty Type</label>
<select>
  <option>Select</option>
  <option>First Shift</option>
  <option>Second Shift</option>
</select>

<label>Duty Mode</label>
<select>
  <option>Select</option>
  <option>90°</option>
  <option>180°</option>
</select>

<label>Vehicle Photo</label>
<select>
  <option>Select</option>
  <option>Yes</option>
  <option>No</option>
</select>

<label>Odometer & Fuel Photo</label>
<select>
  <option>Select</option>
  <option>Yes</option>
  <option>No</option>
</select>

<!-- AUTO -->
<div class="auto-box">
  <label>Attendance IN Time (Auto)</label>
  <input type="text" id="attendanceTime" readonly>

  <label>Attendance IN Location (Auto GPS)</label>
  <input type="text" id="attendanceLocation" readonly>
</div>

<!-- REMARK -->
<label>Remark (Optional)</label>
<textarea id="remarkBox" maxlength="200"></textarea>

<!-- TERMS -->
<div class="checkbox">
  <input type="checkbox" id="agreeTerms">
  <label>I accept Terms and Conditions</label>
</div>

<!-- BUTTON -->
<button class="btn" onclick="validateAndCapture()">Capture Attendance</button>

<script>

// AUTO TIME
function setTime() {
  let now = new Date();
  document.getElementById("attendanceTime").value = now.toLocaleString();
}

// AUTO GPS
function setLocation() {
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(function(pos) {
      document.getElementById("attendanceLocation").value =
        pos.coords.latitude + ", " + pos.coords.longitude;
    });
  }
}

setTime();
setLocation();


// MAIN VALIDATION
function validateAndCapture() {

  let selects = document.querySelectorAll("select");

  // CHECK ALL DROPDOWNS
  for (let i = 0; i < selects.length; i++) {
    if (selects[i].value === "Select") {
      alert("Please fill all the Mandatory Vehicle Report");
      return;
    }
  }

  // TERMS CHECK
  let agree = document.getElementById("agreeTerms");
  if (!agree.checked) {
    alert("Please accept Terms and Conditions");
    return;
  }

  // ✅ SUCCESS → RUN ORIGINAL FLOW
  captureAttendance();
}


// YOUR ORIGINAL FUNCTION
function captureAttendance() {

  alert("Attendance Captured Successfully");

  // your existing animation / submit logic stays here

}

</script>

</body>
</html>
