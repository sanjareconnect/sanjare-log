<!DOCTYPE html>
<html>
<head>
  <title>Trip Start</title>

  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      width: 300px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    /* Locked look */
    input[readonly] {
      background-color: #e9ecef;
      cursor: not-allowed;
      font-weight: bold;
    }

    button {
      width: 100%;
      padding: 10px;
      background: green;
      color: #fff;
      border: none;
      border-radius: 6px;
      margin-top: 10px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="card">
  <h2>🚖 Trip Start</h2>

  <!-- OMR -->
  <input type="text" id="omr" placeholder="OMR" readonly>

  <!-- Trip Time -->
  <input type="text" id="tripTime" placeholder="Trip Time" readonly>

  <!-- GPS -->
  <input type="text" id="gps" placeholder="Location (Auto GPS)" readonly>

  <button onclick="startTrip()">Trip Started</button>
</div>

<script>
function startTrip() {

  // 1. OMR (Random example or replace with your logic)
  let omrValue = Math.floor(10000 + Math.random() * 90000);
  document.getElementById("omr").value = omrValue;

  // 2. Trip Time
  let now = new Date();
  document.getElementById("tripTime").value = now.toLocaleString();

  // 3. GPS Fetch
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      function(position) {

        let lat = position.coords.latitude;
        let lon = position.coords.longitude;

        // Show lat/lon (simple & reliable)
        document.getElementById("gps").value = lat + ", " + lon;

      },
      function(error) {
        document.getElementById("gps").value = "GPS Permission Denied";
      }
    );
  } else {
    document.getElementById("gps").value = "GPS Not Supported";
  }

  // Fields already readonly → no need extra lock
}
</script>

</body>
</html>
