<!DOCTYPE html>
<html>
<head>
  <title>Trip System</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      margin: 0;
      padding: 10px;

      /* 🔥 YOUR IMAGE */
      background: url('https://static.vecteezy.com/system/resources/thumbnails/071/519/140/small_2x/person-holding-a-blue-car-model-with-digital-security-and-insurance-icons-concept-of-car-protection-safety-and-security-digital-car-insurance-and-safety-futuristic-technology-photo.jpg') no-repeat center center/cover;

      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    /* 🔥 DARK OVERLAY */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.55);
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      background: rgba(255,255,255,0.95);
      padding: 20px;
      border-radius: 14px;
      width: 100%;
      max-width: 450px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.3);
    }

    h2 {
      text-align: center;
      font-size: 22px;
    }

    select, input {
      width: 100%;
      padding: 14px;
      margin-top: 8px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    select:invalid {
      color: #888;
    }

    input::placeholder {
      color: #888;
    }

    input[readonly], select:disabled {
      background: #e9ecef;
      font-weight: bold;
      color: #000;
    }

    button {
      width: 100%;
      padding: 14px;
      border-radius: 8px;
      margin-top: 12px;
      color: white;
      border: none;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    .btn-green { background: #1f8f3a; }
    .btn-red { background: #c0392b; }
    .btn-blue { background: #2c7be5; }

    .submit-box {
      display: none;
      margin-top: 15px;
      padding: 12px;
      border-radius: 8px;
      background: #f0f4ff;
      text-align: center;
      font-weight: bold;
    }

    .data-flow {
      display: none;
      margin-top: 20px;
      text-align: center;
      font-size: 28px;
    }

    .flow-line {
      display: flex;
      justify-content: center;
      gap: 6px;
    }

    .arrow {
      opacity: 0;
      animation: arrowMove 1.5s infinite;
    }

    .arrow:nth-child(2) { animation-delay: 0.3s; }
    .arrow:nth-child(3) { animation-delay: 0.6s; }

    @keyframes arrowMove {
      0% { opacity: 0; transform: translateX(-10px); }
      50% { opacity: 1; }
      100% { opacity: 0; transform: translateX(10px); }
    }

    .error {
      color: red;
      text-align: center;
    }
  </style>
</head>

<body>

<div class="card">

<h2>🚖 Start Trip</h2>

<select id="driver" required>
  <option value="" disabled selected>UN-Name</option>
  <option value="Mithin Mohan / SJTW-7770">Mithin Mohan / SJTW-7770</option>
  <option value="Nagaraj Mani / SJTW-8047">Nagaraj Mani / SJTW-8047</option>
</select>

<select id="fleet" required>
  <option value="" disabled selected>Fleet No Plate</option>
  <option value="SJTW-Varaha / KL30L8893">SJTW-Varaha / KL30L8893</option>
</select>

<select id="operator" required>
  <option value="" disabled selected>Operator</option>
  <option>Uber</option>
  <option>OLA</option>
  <option>Yatri</option>
  <option>Gozo</option>
  <option>Gogo</option>
  <option>MMT</option>
  <option>Trip Advisor</option>
  <option>Personal</option>
</select>

<select id="tripType" required>
  <option value="" disabled selected>Trip Type</option>
  <option>Inter-City</option>
  <option>Intra-City</option>
  <option>Official</option>
  <option>Maintenance</option>
</select>

<input type="number" id="omr" placeholder="OMR (Start Reading)">
<input type="text" id="startTime" placeholder="Trip Start Time (Auto)" readonly>
<input type="text" id="startGPS" placeholder="Trip Start Location (Auto GPS)" readonly>

<div id="error" class="error"></div>

<button class="btn-green" onclick="startTrip()">Start Trip</button>

<hr>

<h2>🏁 End Trip</h2>

<input type="number" id="cmr" placeholder="CMR (End Reading)">
<input type="number" id="payment" placeholder="Payment (₹)">

<select id="paymentMode">
  <option value="" disabled selected>Payment Mode</option>
  <option>UPI-C</option>
  <option>UPI-P</option>
  <option>Direct</option>
  <option>Credit</option>
  <option>Cash</option>
</select>

<input type="text" id="endTime" placeholder="Trip End Time (Auto)" readonly>
<input type="text" id="endGPS" placeholder="Trip End Location (Auto GPS)" readonly>

<button class="btn-red" onclick="endTrip()">End Trip</button>

<div id="submitBox" class="submit-box">
  Trip Ready for Submission ✅
  <button class="btn-blue" onclick="submitTrip()">Submit Trip</button>
</div>

<div id="dataFlow" class="data-flow">
  🚖
  <div class="flow-line">
    <span class="arrow">➡️</span>
    <span class="arrow">➡️</span>
    <span class="arrow">➡️</span>
  </div>
  📡 ☁️ 🏢
</div>

</div>

<script>
// 🔥 YOUR ORIGINAL JS (UNCHANGED)
</script>

</body>
</html>
